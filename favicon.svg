<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ENT321 Lightbulb Favicon</title>
  <desc id="desc">Stylized glowing lightbulb on a blue circular badge.</desc>

  <defs>
    <linearGradient id="gBulb" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff9b0"/>
      <stop offset="1" stop-color="#ffd24a"/>
    </linearGradient>
    <linearGradient id="gBg" x1="0" x2="1">
      <stop offset="0" stop-color="#0b74de"/>
      <stop offset="1" stop-color="#0a5fb8"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- circular badge background -->
  <circle cx="32" cy="32" r="30" fill="url(#gBg)"/>

  <!-- subtle outer ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

  <!-- bulb glow -->
  <g filter="url(#glow)" opacity="0.95">
    <circle cx="32" cy="22" r="12" fill="url(#gBulb)"/>
  </g>

  <!-- bulb shape (white fill for contrast) -->
  <path d="M32 12c-6.1 0-11 4.9-11 11 0 4 2.2 7.4 5.4 9.3 0.9 0.6 1.4 1.8 1.1 2.8l-0.9 3.2c-0.3 1 0.5 2 1.5 2h8.8c1 0 1.8-1 1.5-2l-0.9-3.2c-0.3-1 0.2-2.2 1.1-2.8 3.2-1.9 5.4-5.3 5.4-9.3 0-6.1-4.9-11-11-11z"
        fill="#ffffff" opacity="0.95"/>

  <!-- filament -->
  <path d="M29.8 22.6c0-1.1.9-2 2-2s2 .9 2 2c0 .6-.24 1.2-.63 1.6L32 27l-0.17-2.8c-.39-.4-.65-1-.05-1.6z"
        fill="#fffbf0" opacity="0.95"/>

  <!-- bulb base -->
  <rect x="26.5" y="34.5" width="11" height="5" rx="1.2" fill="#d6e0ef" opacity="0.95"/>
  <rect x="28.5" y="39.2" width="7" height="3" rx="0.9" fill="#b8c6df" opacity="0.95"/>

  <!-- small highlight -->
  <ellipse cx="28.5" cy="18.5" rx="2.2" ry="1.6" fill="#ffffff" opacity="0.6"/>

</svg>
